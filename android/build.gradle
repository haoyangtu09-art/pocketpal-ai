buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.3.13750724"
        kotlinVersion = "2.1.20"
        glideVersion = "4.16.0"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.devtools.ksp:symbol-processing-gradle-plugin:2.1.20-1.0.32")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force consistent Guava version across all modules
// (Glide and WorkManager/concurrent-futures both pull it in, causing classpath conflicts)
allprojects {
    configurations.all {
        resolutionStrategy {
            force "com.google.guava:guava:32.1.3-android"
        }
    }
}
